name: Testing

on:
  push:
    branches:
      - main
    paths:
      - '**/*.mjs'
      - '**/*.js'
      - '.github/workflows/*.yml'
      - 'package.json'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.mjs'
      - '**/*.js'
      - '.github/workflows/*.yml'
      - 'package.json'

concurrency:
  group: testing-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Security check
        run: npm audit --audit-level=high
  commitlint:
    if: false
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed
  size:
    name: Check Size
    runs-on: ubuntu-slim
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run size
  lint:
    name: Lint Code Base
    runs-on: ubuntu-slim
    # needs: commitlint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
  test:
    name: Testing
    needs:
      - audit
      # - commitlint
      - lint
      - size
    strategy:
      fail-fast: false
      matrix:
        version: [22, 24]
        os: [ubuntu-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Testing with Node ${{ matrix.version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.version }}
          cache: npm
      - run: npm ci
      - run: npm run coverage
